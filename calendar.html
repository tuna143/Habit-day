<!doctype html>
<html lang="en" data-theme="original">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#26735b" />
    <link rel="icon" href="icon.svg?v=48" type="image/svg+xml" data-theme-icon="true" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=48" sizes="180x180" data-theme-icon="true" />
    <link rel="icon" href="icon-192.png?v=48" type="image/png" sizes="192x192" data-theme-icon="true" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Calendar · Habit Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=14" />
    <link rel="stylesheet" href="layout.css?v=49" />
    <link rel="stylesheet" href="themes.css?v=65" />
    <script src="theme.js?v=48"></script>
    <script>
      (function () {
        if (window.caches) {
          caches.keys().then(function (keys) {
            keys.forEach(function (key) {
              if (key !== "habit-day-v50") {
                caches.delete(key);
              }
            });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div class="app-layout">
      <div class="app-content">
        <div class="theme-collage friends-collage theme-collage--subpage theme-decor theme-decor-friends" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/friends/banner.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/friends/hero.svg'"
          />
          <img
            class="theme-photo theme-photo-sub"
            src="assets/friends/day-03.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/friends/scene-14.png';this.onerror=null;this.style.display='none'"
          />
        </div>
        <div class="theme-collage gintama-collage theme-collage--subpage theme-decor theme-decor-gintama" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/gintama/banner.png"
            alt=""
          />
          <img
            class="theme-photo theme-photo-sub"
            src="assets/gintama/scene-08.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/gintama/scene-04.png';this.onerror=null;this.style.display='none'"
          />
        </div>
        <div class="theme-collage toothless-collage theme-collage--subpage theme-decor theme-decor-toothless" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/toothless/banner.png"
            alt=""
          />
          <img
            class="theme-photo theme-photo-sub"
            src="assets/toothless/scene-01.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/toothless/scene-06.png';this.onerror=null;this.style.display='none'"
          />
        </div>
        <div class="theme-collage kuromi-collage theme-collage--subpage theme-decor theme-decor-kuromi" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/kuromi/scene-02.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/kuromi/celebrate.png'"
          />
          <img
            class="theme-photo theme-photo-sub"
            src="assets/kuromi/scene-03.png"
            alt=""
            onerror="this.onerror=null;this.style.display='none'"
          />
        </div>
        <main class="app-shell calendar-page">
          <header class="subpage-header">
            <p class="eyebrow">Habit Day</p>
            <h1>Calendar</h1>
            <p class="summary">Theme photos on each day. Tap a date with saved habit photos to view them.</p>
          </header>

          <section class="board calendar-section" aria-label="Calendar">
            <div class="toolbar">
              <h2>Month</h2>
              <div class="calendar-nav">
                <button class="ghost-button calendar-nav-button" id="calendarPrev" type="button" aria-label="Previous month">‹</button>
                <span class="calendar-month-label" id="calendarMonthLabel"></span>
                <button class="ghost-button calendar-nav-button" id="calendarNext" type="button" aria-label="Next month">›</button>
              </div>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>S</span>
              <span>M</span>
              <span>T</span>
              <span>W</span>
              <span>T</span>
              <span>F</span>
              <span>S</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="calendar-legend">
              <span><i class="legend-dot complete"></i>100% · star photo</span>
              <span><i class="legend-dot partial"></i>1+ done · your / theme scene</span>
              <span><i class="legend-dot snap"></i>Habit photos saved · tap day to view</span>
              <span><i class="legend-dot none"></i>No record</span>
            </div>
          </section>
        </main>
      </div>

      <aside id="app-sidebar" class="app-sidebar" data-page="calendar"></aside>
    </div>

    <div id="calendarDayPhotos" class="calendar-day-photos" hidden>
      <div class="calendar-day-photos-backdrop" aria-hidden="true"></div>
      <div class="calendar-day-photos-panel" role="dialog" aria-modal="true" aria-labelledby="calendarDayPhotosTitle">
        <header class="calendar-day-photos-header">
          <h2 id="calendarDayPhotosTitle">Day photos</h2>
          <button type="button" class="ghost-button" id="calendarDayPhotosClose" aria-label="Close">×</button>
        </header>
        <div class="calendar-day-photos-grid" id="calendarDayPhotosGrid"></div>
        <button type="button" class="primary-button calendar-day-photos-open" id="calendarDayPhotosOpen">
          Open this day on home
        </button>
      </div>
    </div>

    <script src="sidebar.js?v=39"></script>
    <script src="shared.js?v=39"></script>
    <script src="user-photos.js?v=14"></script>
    <script src="habit-photos.js?v=36"></script>
    <script src="calendar.js?v=18"></script>
  </body>
</html>
