<!doctype html>
<html lang="en" data-theme="original">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f6f7f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Calendar · Habit Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="layout.css" />
    <link rel="stylesheet" href="themes.css" />
    <script src="theme.js?v=10"></script>
  </head>
  <body>
    <div class="app-layout">
      <aside id="app-sidebar" class="app-sidebar" data-page="calendar"></aside>

      <div class="app-content">
        <main class="app-shell">
          <header class="subpage-header">
            <p class="eyebrow">Habit Day</p>
            <h1>Calendar</h1>
            <p class="summary">Tap a date to view that day on the main page.</p>
          </header>

          <section class="board calendar-section" aria-label="Calendar">
            <div class="toolbar">
              <h2>Month</h2>
              <div class="calendar-nav">
                <button class="ghost-button calendar-nav-button" id="calendarPrev" type="button" aria-label="Previous month">‹</button>
                <span class="calendar-month-label" id="calendarMonthLabel"></span>
                <button class="ghost-button calendar-nav-button" id="calendarNext" type="button" aria-label="Next month">›</button>
              </div>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>S</span>
              <span>M</span>
              <span>T</span>
              <span>W</span>
              <span>T</span>
              <span>F</span>
              <span>S</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="calendar-legend">
              <span><i class="legend-dot complete"></i>100% · star photo</span>
              <span><i class="legend-dot partial"></i>1+ done · your / theme scene</span>
              <span><i class="legend-dot none"></i>No record</span>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="sidebar.js?v=10"></script>
    <script src="shared.js?v=10"></script>
    <script src="user-photos.js?v=10"></script>
    <script src="calendar.js?v=10"></script>
  </body>
</html>
