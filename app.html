<!doctype html>
<html lang="en" data-theme="original">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#26735b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Habit Day</title>
    <link rel="manifest" href="manifest.webmanifest?v=36" />
    <link rel="icon" href="icon.svg?v=48" type="image/svg+xml" data-theme-icon="true" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=48" sizes="180x180" data-theme-icon="true" />
    <link rel="icon" href="icon-192.png?v=48" type="image/png" sizes="192x192" data-theme-icon="true" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=24" />
    <link rel="stylesheet" href="layout.css?v=50" />
    <link rel="stylesheet" href="themes.css?v=69" />
    <script>
      window.__HABIT_BUILD = "24";
      (function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (reg) {
              reg.update();
            });
          });
        }
        if (window.caches) {
          caches.keys().then(function (keys) {
            keys.forEach(function (key) {
              if (key !== "habit-day-v50") {
                caches.delete(key);
              }
            });
          });
        }
      })();
    </script>
    <script src="theme.js?v=50"></script>
  </head>
  <body>
    <div class="app-layout">
      <div class="app-content">
        <div class="theme-collage friends-collage theme-collage--home theme-decor theme-decor-friends" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/friends/banner.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/friends/hero.svg'"
          />
          <img
            class="theme-photo theme-photo-sub theme-photo-sub--left"
            src="assets/friends/day-04.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/friends/day-02.png';this.onerror=null;this.style.display='none'"
          />
          <img
            class="theme-photo theme-photo-sub theme-photo-sub--right"
            src="assets/friends/day-05.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/friends/day-06.png';this.onerror=null;this.style.display='none'"
          />
        </div>
        <div class="theme-collage gintama-collage theme-collage--home theme-decor theme-decor-gintama" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/gintama/banner.png"
            alt=""
          />
          <img
            class="theme-photo theme-photo-sub theme-photo-sub--left"
            src="assets/gintama/scene-03.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/gintama/scene-04.png';this.onerror=null;this.style.display='none'"
          />
          <img
            class="theme-photo theme-photo-sub theme-photo-sub--right"
            src="assets/gintama/scene-05.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/gintama/scene-06.png';this.onerror=null;this.style.display='none'"
          />
        </div>
        <div class="theme-collage toothless-collage theme-collage--home theme-decor theme-decor-toothless" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/toothless/banner.png"
            alt=""
          />
          <img
            class="theme-photo theme-photo-sub theme-photo-sub--left"
            src="assets/toothless/scene-08.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/toothless/scene-02.png';this.onerror=null;this.style.display='none'"
          />
          <img
            class="theme-photo theme-photo-sub theme-photo-sub--right"
            src="assets/toothless/scene-12.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/toothless/scene-05.png';this.onerror=null;this.style.display='none'"
          />
        </div>
        <div class="theme-collage kuromi-collage theme-collage--home theme-decor theme-decor-kuromi" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/kuromi/celebrate.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/kuromi/hero.svg'"
          />
          <img
            class="theme-photo theme-photo-sub theme-photo-sub--left"
            src="assets/kuromi/scene-01.png"
            alt=""
            onerror="this.onerror=null;this.style.display='none'"
          />
          <img
            class="theme-photo theme-photo-sub theme-photo-sub--right"
            src="assets/kuromi/scene-02.png"
            alt=""
            onerror="this.onerror=null;this.style.display='none'"
          />
        </div>
        <main class="app-shell page-home">
          <section class="overview overview-wrap" aria-labelledby="app-title">
            <div class="overview-copy">
              <p class="eyebrow" id="app-eyebrow">Habit Day</p>
              <h1 id="app-title">Today's Habits</h1>
              <div class="theme-progress-inline" id="themeProgressInline" aria-live="polite">
                <div class="theme-progress-track">
                  <span class="theme-progress-fill" id="themeProgressFill"></span>
                </div>
                <span class="theme-progress-pct" id="themeProgressPct">0%</span>
              </div>
              <p class="summary" id="summaryText">Start small and keep your day moving.</p>
            </div>
            <div class="progress-card" id="progressCard" aria-live="polite">
              <span id="progressPercent">0%</span>
              <p>Complete</p>
              <img
                class="theme-decor theme-decor-kuromi decor-progress"
                data-src-base="assets/kuromi/progress"
                src="assets/kuromi/progress.svg"
                alt=""
              />
            </div>
          </section>

          <section class="composer" aria-label="Add habit">
            <form id="habitForm">
              <label for="habitInput">New habit</label>
              <div class="input-row">
                <input
                  id="habitInput"
                  name="habit"
                  type="text"
                  maxlength="32"
                  placeholder="Example: Drink water"
                  autocomplete="off"
                  enterkeyhint="done"
                />
                <button type="submit" id="habitAddButton">Add</button>
              </div>
            </form>
          </section>

          <section class="board" aria-label="Habit list">
            <div class="toolbar">
              <h2>Checklist</h2>
            </div>
            <ul class="habit-list" id="habitList"></ul>
            <p class="empty-state has-decor" id="emptyState">
              <img
                class="theme-decor theme-decor-kuromi decor-empty"
                data-src-base="assets/kuromi/empty"
                src="assets/kuromi/empty.svg"
                alt=""
              />
              No habits yet. Add one in <strong>New habit</strong> above. Complete each with a quick photo.
            </p>
          </section>
        </main>
      </div>

      <aside id="app-sidebar" class="app-sidebar" data-page="home"></aside>
    </div>

    <div id="themeCelebration" class="theme-celebration" hidden>
      <div class="celebration-backdrop"></div>
      <div class="celebration-fireworks" id="celebrationFireworks" aria-hidden="true"></div>
      <div class="celebration-photo-bursts" id="celebrationPhotoBursts" aria-hidden="true"></div>
      <div class="celebration-panel">
        <div class="celebration-hero">
          <div class="celebration-photo-ring" aria-hidden="true">
            <img
              class="celebration-photo"
              src="assets/friends/banner.png"
              alt=""
              onerror="this.onerror=null;this.src='assets/friends/hero.svg'"
            />
          </div>
          <p class="celebration-tagline">The bunny approves.</p>
          <p class="celebration-title">Perfect day</p>
        </div>
        <p class="celebration-hint">Tap to close</p>
      </div>
    </div>

    <div id="habitCameraOverlay" class="habit-camera-overlay" hidden>
      <div class="habit-camera-backdrop" aria-hidden="true"></div>
      <div class="habit-camera-panel" role="dialog" aria-modal="true" aria-label="Take habit photo">
        <video id="habitCameraVideo" class="habit-camera-video" playsinline muted></video>
        <p class="habit-camera-hint">Silent capture · no shutter sound</p>
        <div class="habit-camera-actions">
          <button type="button" class="ghost-button" id="habitCameraCancel">Cancel</button>
          <button type="button" class="primary-button habit-camera-shutter" id="habitCameraShutter" aria-label="Take photo">
            Capture
          </button>
        </div>
      </div>
    </div>

    <input
      type="file"
      id="habitCameraInput"
      accept="image/*"
      capture="environment"
      hidden
    />

    <template id="habitTemplate">
      <li class="habit-item">
        <button class="check-button" type="button" aria-label="Take photo and complete habit"></button>
        <div class="habit-main">
          <div class="habit-copy">
            <strong></strong>
            <span></span>
          </div>
          <figure class="habit-snap" hidden>
            <img class="habit-snap-img" alt="" />
            <span class="habit-snap-badges" aria-hidden="true">
              <span class="habit-snap-badge habit-snap-badge--1"></span>
              <span class="habit-snap-badge habit-snap-badge--2"></span>
              <span class="habit-snap-badge habit-snap-badge--3"></span>
              <span class="habit-snap-badge habit-snap-badge--4"></span>
            </span>
          </figure>
        </div>
        <button class="delete-button" type="button" aria-label="Delete">x</button>
      </li>
    </template>

    <script src="sidebar.js?v=40"></script>
    <script src="shared.js?v=39"></script>
    <script src="user-photos.js?v=35"></script>
    <script src="habit-photos.js?v=36"></script>
    <script src="habit-camera.js?v=1"></script>
    <script src="fireworks.js?v=39"></script>
    <script src="app.js?v=47"></script>
  </body>
</html>
