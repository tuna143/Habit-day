<!doctype html>
<html lang="en" data-theme="original">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#26735b" />
    <link rel="icon" href="icon.svg?v=44" type="image/svg+xml" data-theme-icon="true" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=44" sizes="180x180" data-theme-icon="true" />
    <link rel="icon" href="icon-192.png?v=44" type="image/png" sizes="192x192" data-theme-icon="true" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Weekly Stats · Habit Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=14" />
    <link rel="stylesheet" href="layout.css?v=49" />
    <link rel="stylesheet" href="themes.css?v=61" />
    <script src="theme.js?v=44"></script>
    <script>
      (function () {
        if (window.caches) {
          caches.keys().then(function (keys) {
            keys.forEach(function (key) {
              if (key !== "habit-day-v48") {
                caches.delete(key);
              }
            });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div class="app-layout">
      <div class="app-content">
        <div class="theme-collage friends-collage theme-collage--subpage theme-decor theme-decor-friends" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/friends/weekly-accent.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/friends/banner.png'"
          />
          <img
            class="theme-photo theme-photo-sub"
            src="assets/friends/day-08.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/friends/day-06.png';this.onerror=null;this.style.display='none'"
          />
        </div>
        <div class="theme-collage gintama-collage theme-collage--subpage theme-decor theme-decor-gintama" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/gintama/scene-06.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/gintama/banner.png'"
          />
          <img
            class="theme-photo theme-photo-sub"
            src="assets/gintama/scene-09.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/gintama/scene-07.png';this.onerror=null;this.style.display='none'"
          />
        </div>
        <div class="theme-collage toothless-collage theme-collage--subpage theme-decor theme-decor-toothless" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/toothless/scene-09.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/toothless/banner.png'"
          />
          <img
            class="theme-photo theme-photo-sub"
            src="assets/toothless/scene-14.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/toothless/scene-03.png';this.onerror=null;this.style.display='none'"
          />
        </div>
        <div class="theme-collage kuromi-collage theme-collage--subpage theme-decor theme-decor-kuromi" aria-hidden="true">
          <img
            class="theme-photo theme-photo-main"
            src="assets/kuromi/celebrate.png"
            alt=""
            onerror="this.onerror=null;this.src='assets/kuromi/hero.svg'"
          />
          <img
            class="theme-photo theme-photo-sub"
            src="assets/kuromi/scene-04.png"
            alt=""
            onerror="this.onerror=null;this.style.display='none'"
          />
        </div>
        <main class="app-shell weekly-page">
          <header class="subpage-header">
            <p class="eyebrow">Habit Day</p>
            <h1>Weekly Stats</h1>
            <p class="summary">Tap a day to jump to that date on the main page.</p>
          </header>

          <section class="board stats-section" aria-label="Weekly stats">
            <div class="weekly-overview" id="weeklyOverview"></div>
            <div class="weekly-chart" id="weeklyChart"></div>
            <p class="stats-summary" id="weeklySummary">Your weekly record will show here.</p>
          </section>
        </main>
      </div>

      <aside id="app-sidebar" class="app-sidebar" data-page="weekly"></aside>
    </div>

    <script src="sidebar.js?v=39"></script>
    <script src="shared.js?v=39"></script>
    <script src="user-photos.js?v=14"></script>
    <script src="weekly.js?v=14"></script>
  </body>
</html>
